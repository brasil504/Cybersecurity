<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #000;
    color: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .wrapper {
    display: flex;
    min-height: 100vh;
  }
  .left {
    flex: 1;
    background: #121212;
    border-right: 1px solid #262626;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }
  .ig-logo {
    width: 70px;
    height: 70px;
    border-radius: 22px;
    background: radial-gradient(circle at 30% 110%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 30px;
  }
  .ig-logo svg { width: 38px; height: 38px; }
  .tagline {
    font-size: 32px;
    text-align: center;
    line-height: 1.3;
    font-weight: 600;
    max-width: 480px;
    margin-bottom: 36px;
  }
  .tagline .accent { color: #ff3aa0; }
  .phones {
    position: relative;
    width: 260px;
    height: 220px;
  }
  .phone {
    position: absolute;
    width: 150px;
    height: 200px;
    border-radius: 18px;
    overflow: hidden;
    border: 4px solid #2a2a2a;
    background-size: cover;
    background-position: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  }
  .phone1 {
    left: 0;
    top: 20px;
    background-image: url('https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=300&q=60');
    transform: rotate(-6deg);
  }
  .phone2 {
    left: 55px;
    top: 0;
    background-image: url('https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=300&q=60');
    z-index: 2;
  }
  .phone3 {
    left: 110px;
    top: 25px;
    background-image: url('https://images.unsplash.com/photo-1517841905240-472988babdf9?w=300&q=60');
    transform: rotate(6deg);
  }
  .right {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }
  .login-box {
    width: 100%;
    max-width: 350px;
  }
  .login-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 24px;
  }
  input {
    width: 100%;
    padding: 14px;
    margin-bottom: 12px;
    background: #000;
    border: 1px solid #555;
    border-radius: 8px;
    color: #f5f5f5;
    font-size: 14px;
  }
  input::placeholder { color: #8e8e8e; }
  input:focus { outline: none; border-color: #777; }
  .login-btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 8px;
    background: #1e3a6e;
    color: #7c93b8;
    font-weight: 600;
    font-size: 15px;
    cursor: not-allowed;
    margin-bottom: 18px;
  }
  .login-btn.active {
    background: #0d6efd;
    color: #fff;
    cursor: pointer;
  }
  .forgot {
    text-align: center;
    font-size: 13px;
    color: #4da6ff;
    text-decoration: none;
    display: block;
    margin-bottom: 40px;
  }
  .divider-space { height: 16px; }
  .fb-btn, .create-btn {
    width: 100%;
    padding: 13px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 14px;
    cursor: pointer;
    text-align: center;
  }
  .fb-btn {
    background: transparent;
    border: 1px solid #555;
    color: #4da6ff;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .create-btn {
    background: transparent;
    border: 1px solid #0d6efd;
    color: #4da6ff;
  }
  .meta-logo {
    margin-top: 30px;
    color: #8e8e8e;
    font-size: 14px;
    text-align: center;
  }
  @media (max-width: 860px) {
    .wrapper { flex-direction: column; }
    .left { border-right: none; border-bottom: 1px solid #262626; padding: 30px 20px; }
    .tagline { font-size: 24px; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="left">
    <div class="ig-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <rect x="2" y="2" width="20" height="20" rx="5"/>
        <circle cx="12" cy="12" r="4.5"/>
        <circle cx="17.5" cy="6.5" r="1.2" fill="white" stroke="none"/>
      </svg>
    </div>
    <div class="tagline">See everyday moments from your <span class="accent">close friends</span>.</div>
    <div class="phones">
      <div class="phone phone1"></div>
      <div class="phone phone2"></div>
      <div class="phone phone3"></div>
    </div>
  </div>

  <div class="right">
    <div class="login-box">
      <div class="login-title">Log in to Instagram</div>
      <input id="user" type="text" placeholder="Mobile number, username or email address">
      <input id="pass" type="password" placeholder="Password">
      <button class="login-btn" id="loginBtn">Log in</button>
      <a class="forgot" href="#">Forgotten password?</a>
      <button class="fb-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877f2"><path d="M22 12a10 10 0 1 0-11.6 9.9v-7H7.9V12h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.5h-1.3c-1.2 0-1.6.8-1.6 1.6V12h2.8l-.4 2.9h-2.4v7A10 10 0 0 0 22 12Z"/></svg>
        Log in with Facebook
      </button>
      <button class="create-btn">Create new account</button>
      <div class="meta-logo">∞ Meta</div>
    </div>
  </div>
</div>

<script>
  const user = document.getElementById('user');
  const pass = document.getElementById('pass');
  const btn = document.getElementById('loginBtn');
  function check() {
    if (user.value.trim() && pass.value.trim()) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  }
  user.addEventListener('input', check);
  pass.addEventListener('input', check);
</script>
</body>
</html>
